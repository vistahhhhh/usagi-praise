[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# ECNU 快速问答：Netlify Function 路由
[[redirects]]
  from = "/api/ecnu-chat"
  to = "/.netlify/functions/ecnu-chat"
  status = 200

# Coze 智能体：Netlify Edge Function 路由
[[edge_functions]]
  path = "/api/coze-chat"
  function = "coze-chat"
